<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* SELETORES PERSONALIZADOS
            #  = id
            .  = class
            :  = pseudo-class
            :: = pseudo-element
            >  = children
        */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        .especial {
            background-color: rgb(31, 244, 28);
        }

        a:active {
            color: yellow;
        }

        a::after {
            content: ' [link]';
            text-decoration: none;
            font-weight: bold;
            color: rgb(65, 62, 62);
        }

    </style>

</head>

<body>

    <h1>Personalizando Links:</h1>
    <ul>

        <li><a href="https://github.com/AlandersonBraz?tab=repositories" target="_blank" class="especial">Meu Repositório do GitHub</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank">Canal do YouTube do Curso em Vídeo</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank">Site do Curso em Vídeo</a></li>

    </ul>
    
</body>

</html>
